<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1000" height="260" fill="#020617"/>

  <!-- Neon Gradient -->
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Animated top line -->
  <rect x="0" y="0" width="1000" height="3" fill="url(#neon)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated bottom line -->
  <rect x="0" y="257" width="1000" height="3" fill="url(#neon)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="50%" y="48%" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="40"
        fill="#e2e8f0"
        font-weight="600">
    Student Performance Visualizer
  </text>

  <!-- Subtitle -->
  <text x="50%" y="65%" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="16"
        fill="#38bdf8">
    Python • Data Analysis • Visualization
  </text>

  <!-- Branding -->
  <text x="50%" y="80%" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="14"
        fill="#94a3b8">
    Built by Alen Kuriakose Padappanackal
  </text>

</svg>
